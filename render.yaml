services:
  - type: web
    name: pocket-option-bot
    env: node
    plan: free
    buildCommand: npm install && npx playwright install chromium && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: POCKET_EMAIL
        sync: false
      - key: POCKET_PASSWORD
        sync: false
      - key: POCKER_TOKEN
        sync: false
      - key: POCKET_USER_ID
        sync: false
    healthCheckPath: /
    autoDeploy: true